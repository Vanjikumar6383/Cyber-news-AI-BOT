<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber News | Real-Time Intel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Audiowide&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-black text-white font-['Orbitron'] overflow-hidden">
    <!-- Intro Animation Screen -->
    <div id="intro" class="fixed inset-0 z-[100] flex items-center justify-center bg-black overflow-hidden">
        <canvas id="intro-canvas" class="absolute inset-0"></canvas>
        <div class="relative z-10 text-center">
            <h1 id="intro-title"
                class="text-6xl md:text-8xl font-bold tracking-tighter text-[#ff0033] drop-shadow-[0_0_15px_rgba(255,0,51,0.8)] opacity-0">
                CYBER NEWS
            </h1>
            <p id="intro-subtitle" class="text-sm md:text-base tracking-[0.5em] text-[#ff0033]/60 mt-4 opacity-0">
                SYSTEM INITIALIZING...
            </p>
        </div>
        <div id="scanline"
            class="absolute inset-0 pointer-events-none bg-gradient-to-b from-transparent via-[#ff0033]/5 to-transparent h-[100px] w-full -translate-y-full opacity-30">
        </div>
    </div>

    <!-- Main Content -->
    <main id="main-content" class="hidden opacity-0 h-screen w-full relative">
        <!-- Background Canvas -->
        <canvas id="main-canvas" class="absolute inset-0 -z-10"></canvas>

        <!-- UI Overlay -->
        <div class="absolute inset-0 bg-gradient-to-b from-black/80 via-transparent to-black/80 pointer-events-none">
        </div>

        <!-- Header -->
        <header class="relative z-10 border-b border-[#ff0033]/30 bg-black/80 backdrop-blur-xl p-4 sticky top-0">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                    <h2 class="text-2xl font-bold text-[#ff0033] glitch cursor-pointer" data-text="CYBER NEWS"
                        onclick="window.location.reload()">CYBER NEWS</h2>
                    <div
                        class="hidden lg:flex items-center gap-2 text-[10px] text-[#ff0033]/60 border-l border-[#ff0033]/30 pl-4 uppercase tracking-[0.3em]">
                        <span class="w-1.5 h-1.5 rounded-full bg-red-600 animate-pulse"></span>
                        Neural link established
                    </div>
                </div>

                <div class="flex flex-1 max-w-xl w-full items-center gap-3">
                    <div class="relative w-full group">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-4 w-4 text-[#ff0033]/50" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                        </div>
                        <input type="text" id="news-search" placeholder="SEARCH SATELLITE UPLINK..."
                            class="w-full bg-black/50 border border-[#ff0033]/30 text-[#ff0033] text-xs pl-10 pr-4 py-2.5 rounded-sm focus:border-[#ff0033] focus:ring-1 focus:ring-[#ff0033]/20 outline-none transition-all placeholder:text-[#ff0033]/30 font-mono">
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <nav class="flex gap-4 border-r border-[#ff0033]/30 pr-4">
                        <button id="tab-live"
                            class="text-[10px] text-[#ff0033] font-bold tracking-widest px-2 py-1 border-b-2 border-[#ff0033]">LIVE
                            FEED</button>
                        <button id="tab-saved"
                            class="text-[10px] text-[#ff0033]/50 hover:text-[#ff0033] font-bold tracking-widest px-2 py-1 transition-all flex items-center gap-1">
                            SAVED INTEL
                            <span id="wishlist-badge"
                                class="bg-[#ff0033] text-black text-[8px] px-1 rounded-full hidden">0</span>
                        </button>
                    </nav>

                    <div class="flex items-center gap-2">
                        <select id="level-filter"
                            class="bg-black border border-[#ff0033]/30 text-[#ff0033] text-[9px] p-2 focus:ring-1 focus:ring-[#ff0033] outline-none rounded-sm transition-all hover:bg-[#ff0033]/10 cursor-pointer uppercase tracking-widest">
                            <option value="all">ALL LEVELS</option>
                            <option value="state">STATE LEVEL</option>
                            <option value="national">NATIONAL LEVEL</option>
                            <option value="world">WORLD LEVEL</option>
                        </select>
                        <select id="country-filter"
                            class="bg-black border border-[#ff0033]/30 text-[#ff0033] text-[9px] p-2 focus:ring-1 focus:ring-[#ff0033] outline-none rounded-sm transition-all hover:bg-[#ff0033]/10 cursor-pointer uppercase tracking-widest">
                            <option value="all">GLOBAL NET</option>
                            <option value="us">US DOMAIN</option>
                            <option value="in">IN DOMAIN</option>
                            <option value="gb">UK DOMAIN</option>
                            <option value="ru">RU DOMAIN</option>
                            <option value="cn">CN DOMAIN</option>
                        </select>
                    </div>
                </div>
            </div>
        </header>

        <!-- News Feed Section -->
        <div class="relative z-10 h-[calc(100vh-76px)] overflow-y-auto custom-scrollbar p-6">
            <div class="max-w-7xl mx-auto">
                <!-- Status Bar -->
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                    <div
                        class="bg-black/80 border border-[#ff0033]/20 p-4 rounded-sm group hover:border-[#ff0033]/50 transition-colors">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-[9px] text-[#ff0033]/50 uppercase tracking-widest">GLOBAL THREAT</span>
                            <span class="w-2 h-2 rounded-sm bg-red-600 shadow-[0_0_5px_red]"></span>
                        </div>
                        <span id="threat-level" class="text-lg font-bold text-[#ff0033]">CRITICAL</span>
                    </div>
                    <div
                        class="bg-black/80 border border-[#ff0033]/20 p-4 rounded-sm group hover:border-[#ff0033]/50 transition-colors">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-[9px] text-[#ff0033]/50 uppercase tracking-widest">ACTIVE NODES</span>
                        </div>
                        <span id="active-feeds" class="text-lg font-bold text-[#ff0033]">1280.0.0.1</span>
                    </div>
                    <div
                        class="bg-black/80 border border-[#ff0033]/20 p-4 rounded-sm group hover:border-[#ff0033]/50 transition-colors">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-[9px] text-[#ff0033]/50 uppercase tracking-widest">INTEL PACKETS</span>
                        </div>
                        <span id="news-count" class="text-lg font-bold text-[#ff0033]">00</span>
                    </div>
                    <div
                        class="bg-black/80 border border-[#ff0033]/20 p-4 rounded-sm group hover:border-[#ff0033]/50 transition-colors">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-[9px] text-[#ff0033]/50 uppercase tracking-widest">PERSISTENT CACHE</span>
                        </div>
                        <span id="db-status" class="text-lg font-bold text-[#ff0033] uppercase">ENCRYPTED DB</span>
                    </div>
                </div>

                <!-- News Grid -->
                <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-20">
                    <!-- News cards will be injected here -->
                    <div class="col-span-full flex flex-col items-center justify-center py-20 gap-4">
                        <div class="w-12 h-12 border-2 border-[#ff0033] border-t-transparent rounded-full animate-spin">
                        </div>
                        <p class="text-[#ff0033] animate-pulse">DECRYPTING DATA STREAMS...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer Overlay -->
        <div class="absolute bottom-0 left-0 w-full bg-black/80 border-t border-[#ff0033]/20 p-2 relative z-10">
            <div class="max-w-7xl mx-auto flex justify-between text-[10px] text-[#ff0033]/40 tracking-widest uppercase">
                <span>© 2024 CYBER NEWS INTELLIGENCE</span>
                <span>ENC: AES-256 BIT</span>
                <span>STATUS: OPERATIONAL</span>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
